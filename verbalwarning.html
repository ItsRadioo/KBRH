<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verbal Warning Log</title>
<link href="style.css" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="data-store.js"></script>
<script>requireLogin();</script>
</head>
<body class="page-verbalwarning">
<header><div class="header-top"><div class="brand-and-title"><div aria-hidden="true" class="brand-mark">KB</div><div class="page-heading"><span class="app-name">Ken Brown Recovery Home</span>
<h1>Verbal Warning Log</h1>
<p>Track verbal warnings and resident responses.</p>
</div></div><button class="logout-btn" onclick="logout()" type="button">Sign Out</button></div><nav aria-label="Primary navigation" class="app-nav"><a class="app-nav-link" href="roster.html">Roster</a><a class="app-nav-link" href="waitlist.html">Waitlist</a><a class="app-nav-link" href="index.html">House Chores</a><a class="app-nav-link" href="meal-chores.html">Meal Chores</a><a aria-current="page" class="app-nav-link active" href="verbalwarning.html">Warnings</a><a class="app-nav-link" href="counseling-notes.html">Counselling Notes</a></nav></header>
<main>
<section class="card wide">
<h2>Add Verbal Warning</h2>
<div class="form-row">
<div class="field-group">
<label for="warningDate">Date</label>
<input id="warningDate" type="date"/>
</div>
<div class="field-group">
<label>Time</label>
<div class="form-row" style="margin-top: 0;">
<select id="warningHour"></select>
<select id="warningMinute"></select>
<select id="warningAmPm"></select>
</div>
</div>
<div class="field-group">
<label for="warningResident">Resident</label>
<select id="warningResident" onchange="toggleOtherResidentField()"></select>
</div>
<div class="field-group hidden" id="otherResidentWrap">
<label for="otherResidentName">Other Resident Name</label>
<input id="otherResidentName" placeholder="Type resident name" type="text"/>
</div>
<div class="field-group">
<label for="warningIncident">Incident</label>
<textarea class="notes-box" id="warningIncident"></textarea>
</div>
<div class="field-group">
<label for="warningStaffAction">Staff Action</label>
<textarea class="notes-box" id="warningStaffAction"></textarea>
</div>
<div class="field-group">
<label for="warningResidentResponse">Resident Response</label>
<textarea class="notes-box" id="warningResidentResponse"></textarea>
</div>
</div>
<div class="button-row">
<button id="addWarningBtn" type="button">Add Verbal Warning</button>
</div>
</section>
<section class="card wide">
<h2>Warning Log</h2>
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Resident</th>
<th>Incident</th>
<th>Staff Action</th>
<th>Resident Response</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="warningBody"></tbody>
</table>
</div>
</section>
</main>

<script src="verbalwarning.js"></script>
</body>
</html>
