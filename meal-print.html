<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dish Schedule</title>
  <link rel="stylesheet" href="style.css" />

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="data-store.js"></script>
  <script>requireLogin();</script>
</head>

<body>
  <header class="no-print">
    <div>
      <h1>Dish Schedule Print</h1>
      <p>Prints the saved weekly meal schedule.</p>
    </div>
    <nav>
      <a href="index.html">House Chores</a>
      <a href="meal-chores.html">Meal Chores</a>
      <a class="active" href="meal-print.html">Meal Print</a>
      <a href="print.html">Cleaning Print</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>
  </header>

  <main class="dish-print-main">
    <div class="no-print dish-print-controls">
      <label>
        Week of
        <input id="mealWeekStart" type="date" />
      </label>

      <button onclick="window.print()">Print Dish Schedule</button>
      <a class="button-link" href="meal-chores.html">Back to Meal Chores</a>
    </div>

    <section class="dish-print-template">
      <h1>Dish Schedule</h1>

      <h2 id="mealWeekStartPrint">Week of</h2>

      <p class="meal-note">
        Tables To Be Set 30 Mins Prior To <u>Meal Times</u>
      </p>

      <div id="mealPrintBody"></div>
    </section>
  </main>

  <script src="meal-print.js"></script>
</body>
</html>
