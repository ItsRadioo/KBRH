<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Chores</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="data-store.js"></script>
  <script>requireLogin();</script>
</head>
<body>
  <header>
    <div>
      <h1>Meal Chores</h1>
      <p>Generate a weekly meal schedule. Lunch has one resident; supper has two residents.</p>
    </div>
       <nav>
  <label class="page-nav-label" for="pageSelect">Go to:</label>
  <select id="pageSelect" class="page-select">
    <option value="waitlist.html">Waitlist</option>
    <option value="roster.html">Current Roster</option>
    <option value="index.html">House Chores</option>
    <option value="verbalwarning.html">Verbal Warning Log</option>
    <option value="counseling-notes.html">Counseling Notes</option>
  </select>

  <button class="logout-btn" onclick="logout()">Logout</button>
</nav>

<script>
  const pageSelect = document.getElementById("pageSelect");
  pageSelect.value = window.location.pathname.split("/").pop() || "index.html";

  pageSelect.addEventListener("change", () => {
    window.location.href = pageSelect.value;
  });
</script>
  </header>

  <main>
    <section class="card wide">
      <h2>Weekly Meal Schedule</h2>
      <p class="hint">Click Generate Meal Week to fill Monday–Sunday using the active resident list. Away and archived residents are omitted.</p>

      <div class="button-row">
        <button id="generateMealBtn" type="button">Generate Meal Week</button>
        <button id="randomMealBtn" type="button" class="warning">Random Meal Week</button>
        <button id="saveMealBtn" type="button">Save Meal Schedule</button>
        <button id="clearMealBtn" type="button" class="secondary">Clear Meal Schedule</button>
        <button id="printMealBtn" type="button" class="secondary">Print Simple Table</button>
        <a class="button-link" href="meal-print.html">Open Printable Meal Template</a>
      </div>

      <div class="table-wrap">
        <table class="meal-week-table">
          <thead>
            <tr>
              <th>Day</th>
              <th>Lunch</th>
              <th>Supper 1</th>
              <th>Supper 2</th>
            </tr>
          </thead>
          <tbody id="mealBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="meal-chores.js"></script>
</body>
</html>
