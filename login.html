<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff Login | Resident Chore Rotator</title>
<link href="style.css" rel="stylesheet"/>
</head>
<body class="login-body page-login">
<main class="login-wrap">
<section class="card login-card"><div class="login-brand"><div class="login-brand-mark">KB</div><div><strong>Ken Brown Recovery Home</strong><span>Staff Administration</span></div></div>
<h1>Staff Login</h1>
<p class="hint">Sign in with your staff account.</p>
<label for="email">Email</label>
<input autocomplete="username" id="email" placeholder="staff@example.com" type="email"/>
<label for="password">Password</label>
<input autocomplete="current-password" id="password" placeholder="Password" type="password"/>
<button id="loginBtn" type="button">Login</button>
<p class="error" id="errorMessage"></p>
</section>
</main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    async function handleLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const error = document.getElementById("errorMessage");

      error.textContent = "";

      if (!email || !password) {
        error.textContent = "Enter your email and password.";
        return;
      }

      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = "index.html";
      } catch (err) {
        console.error(err);
        error.textContent = "Login failed. Check the email and password.";
      }
    }

    document.getElementById("loginBtn").onclick = handleLogin;
    document.getElementById("password").addEventListener("keyup", event => {
      if (event.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
