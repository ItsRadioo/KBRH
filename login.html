<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login | Resident Chore Rotator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <main class="login-wrap">
    <section class="card login-card">
      <h1>Staff Login</h1>
      <p class="hint">Sign in with your staff account.</p>

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="staff@example.com" autocomplete="username" />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />

      <button id="loginBtn" type="button">Login</button>
      <p id="errorMessage" class="error"></p>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    async function handleLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const error = document.getElementById("errorMessage");

      error.textContent = "";

      if (!email || !password) {
        error.textContent = "Enter your email and password.";
        return;
      }

      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = "index.html";
      } catch (err) {
        console.error(err);
        error.textContent = "Login failed. Check the email and password.";
      }
    }

    document.getElementById("loginBtn").onclick = handleLogin;
    document.getElementById("password").addEventListener("keyup", event => {
      if (event.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
